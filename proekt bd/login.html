<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Магазин автозапчастей</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <h2>Вход в личный кабинет</h2>
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button id="login-btn" class="btn">Войти</button>
        <p style="margin-top: 15px;">Нет аккаунта? <a href="register.html">Регистрация</a></p>
    </div>

    <script>
        document.getElementById('login-btn').addEventListener('click', async () => {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    alert("Успешный вход!");
                    window.location.href = 'main.html'; // Переход на главную
                } else {
                    alert("Ошибка: " + data.message);
                }
            } catch (error) {
                alert("Ошибка подключения к серверу");
            }
        });
    </script>
    <form onsubmit="loginUser(event)">
    <input type="text" name="username" placeholder="Имя пользователя" required>
    <input type="password" name="password" placeholder="Пароль" required>
    <button type="submit">Войти</button>
</form>
    <script src="auth.js"></script>
</body>
</html>
